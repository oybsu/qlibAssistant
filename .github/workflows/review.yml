name: Review

on:
  workflow_run:
    workflows: ["Analysis"]
    types:
      - completed
  workflow_dispatch:

jobs:
  check-home-access:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: 1. 下载最新qlib_bin.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo chenditc/investment_data --pattern "qlib_bin.tar.gz"
          mkdir -p ~/.qlib/qlib_data/cn_data
          tar -zxf qlib_bin.tar.gz -C ~/.qlib/qlib_data/cn_data --strip-components=1
          tail -n1 ~/.qlib/qlib_data/cn_data/calendars/day.txt

      - name: 2. Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: 从 qlib_score 拉取数据
        run: |
          git fetch origin qlib_score
          git checkout origin/qlib_score -- qlib_score_csv || mkdir -p qlib_score_csv

      - name: Review
        run: |
          cd ./roll && python ./roll.py model review

      - name: Backtest
        run: |
          cd ./roll && python ./roll.py model backtest

      - name: 提交 review_csv 和 backtest_csv 到 qlib_score 分支
        run: |
          mkdir -p /tmp/review_results /tmp/backtest_results
          cp -r review_csv/* /tmp/review_results/ 2>/dev/null || true
          cp -r backtest_csv/* /tmp/backtest_results/ 2>/dev/null || true
          git fetch origin
          if git show-ref --quiet refs/remotes/origin/qlib_score; then
            git checkout qlib_score
            git pull origin qlib_score
          else
            git checkout -b qlib_score
          fi
          mkdir -p review_csv backtest_csv
          cp -r /tmp/review_results/* review_csv/ 2>/dev/null || true
          cp -r /tmp/backtest_results/* backtest_csv/ 2>/dev/null || true
          git add -f review_csv/ backtest_csv/
          if ! git diff --cached --quiet; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "自动同步回测和复盘csv: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin qlib_score
          else
            echo "无变化，跳过推送。"
          fi
